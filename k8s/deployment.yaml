apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-nodejs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-nodejs-app
  template:
    metadata:
      labels:
        app: devops-nodejs-app
    spec:
      containers:
        - name: devops-nodejs-app
          image: developer1245/devops-app:IMAGE_TAG
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
